# Databricks Asset Bundle configuration for AeroVista Travel Pipeline
bundle:
  name: aerovista-travel-pipeline

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name
    default: aerovista_bootcamp
  
  bronze_schema:
    description: Bronze schema name
    default: bronze
  
  silver_schema:
    description: Silver schema name
    default: silver

targets:
  dev:
    mode: development
    default: true
    
  prod:
    mode: production
    workspace:
      root_path: /Workspace/.bundles/prod/${bundle.name}

resources:
  pipelines:
    aerovista_travel_etl:
      name: "[${bundle.target}] AeroVista Travel ETL Pipeline"
      
      catalog: ${var.catalog}
      target: ${var.silver_schema}
      
      libraries:
        - notebook:
            path: ./src/travel_etl_pipeline.py
      
      configuration:
        catalog: ${var.catalog}
        bronze_schema: ${var.bronze_schema}
        silver_schema: ${var.silver_schema}
      
      serverless: true
      
      continuous: false
      channel: CURRENT
      photon: true
      development: true